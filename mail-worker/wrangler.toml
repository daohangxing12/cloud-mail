name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

# STABLE GUARD:
# mail.ntmcn.com 是当前稳定网页入口；212202.xyz 是当前稳定 API/同步入口。
# 禁止改回 email.ntmcn.com、api.orz.gay、ppp.nte.li 或其它历史测试入口。
[observability]
enabled = true

[[routes]]
pattern = "mail.ntmcn.com"
custom_domain = true

[[routes]]
pattern = "212202.xyz"
custom_domain = true

[[d1_databases]]
binding = "db"
database_name = "cloud-mail-db"
database_id = "4fcbeda4-da5a-4577-9b16-e50fe8dfb78c"

[[kv_namespaces]]
binding = "kv"
id = "03025afe3e0b41acb7bf103c4d472b91"

[ai]
binding = "ai"

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]

[vars]
ai_model = ""
analysis_cache = false
orm_log = false
domain = ["feilong168.com", "ntmcn.com", "baofa.de"]
admin = "admin@orz.gay"

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"

